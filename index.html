<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EclipseR - Interstellar Browser</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Tab Bar -->
        <div class="tab-bar">
            <div class="tabs-container" id="tabsContainer"></div>
            <button class="new-tab-btn" id="newTabBtn" title="New Tab (Ctrl+T)">
                <span class="icon">+</span>
            </button>
        </div>

        <!-- Navigation Bar -->
        <div class="nav-bar">
            <div class="nav-buttons">
                <button class="nav-btn" id="backBtn" title="Back (Alt+Left)">
                    <span>←</span>
                </button>
                <button class="nav-btn" id="forwardBtn" title="Forward (Alt+Right)">
                    <span>→</span>
                </button>
                <button class="nav-btn" id="reloadBtn" title="Reload (Ctrl+R)">
                    <span>⟳</span>
                </button>
                <button class="nav-btn" id="stopBtn" title="Stop Loading">
                    <span>⊗</span>
                </button>
            </div>

            <!-- Address Bar -->
            <div class="address-bar-container">
                <input 
                    type="text" 
                    class="address-bar" 
                    id="addressBar" 
                    placeholder="Enter URL or search..."
                    spellcheck="false"
                >
                <div class="dns-info" id="dnsInfo"></div>
            </div>

            <button class="settings-btn" id="settingsBtn" title="Settings">
                ⚙
            </button>
        </div>

        <!-- Webview Container -->
        <div class="content-area">
            <webview 
                id="webview" 
                style="width: 100%; height: 100%; border: none;"
            ></webview>
        </div>

        <!-- Loading Indicator -->
        <div class="loading-indicator" id="loadingIndicator">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
